<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новое обращение</title>
</head>
<body style="margin:0;padding:0;background:#f5f3ff;font-family:'Segoe UI',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:40px 20px;">
            <table width="580" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background:#7c3aed;padding:32px 40px;text-align:center;">
                        <h1 style="color:#ffffff;margin:0;font-size:22px;font-weight:700;">
                            Новое обращение от пользователя
                        </h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:36px 40px;">
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="padding:10px 0;border-bottom:1px solid #f0eeff;">
                                    <span style="color:#9994b4;font-size:13px;font-weight:600;text-transform:uppercase;">Имя</span><br>
                                    <span style="color:#1a1635;font-size:15px;" th:text="${senderName}"></span>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;border-bottom:1px solid #f0eeff;">
                                    <span style="color:#9994b4;font-size:13px;font-weight:600;text-transform:uppercase;">Email</span><br>
                                    <span style="color:#1a1635;font-size:15px;" th:text="${senderEmail}"></span>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;border-bottom:1px solid #f0eeff;">
                                    <span style="color:#9994b4;font-size:13px;font-weight:600;text-transform:uppercase;">Тема</span><br>
                                    <span style="color:#1a1635;font-size:15px;" th:text="${subject}"></span>
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;">
                                    <span style="color:#9994b4;font-size:13px;font-weight:600;text-transform:uppercase;">Сообщение</span><br>
                                    <p style="color:#1a1635;font-size:15px;line-height:1.6;margin:8px 0 0;white-space:pre-wrap;"
                                       th:text="${messageText}"></p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="background:#f8f7ff;padding:20px 40px;text-align:center;">
                        <p style="color:#9994b4;font-size:12px;margin:0;">
                            Это автоматическое уведомление платформы Freizeitgestaltung
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
